<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>

<style>

:root {
  --primary: #5865f2;
  --primary-dark: #4752c4;
  --bg: #eef1f7;
  --border: #e5e7eb;
  --received: #ffffff;
  --shadow: 0 6px 20px rgba(0,0,0,0.06);
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: Inter, system-ui, sans-serif;
  background: var(--bg);
  overflow: hidden;
}

.app {
  height: 100%;
  display: flex;
  position: relative;
}

/* ================= CHAT ================= */

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: linear-gradient(to bottom, #f9fafc, #eef1f7);
}

/* HEADER */
.chat-header {
  height: 65px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.user {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user img {
  width: 42px;
  border-radius: 50%;
}

.user h4 {
  font-size: 15px;
}

.user span {
  font-size: 12px;
  color: #22c55e;
}

.icon-btn {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

/* ================= MESSAGES ================= */

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 25px 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scroll-behavior: smooth;
}

/* Custom scrollbar */
.messages::-webkit-scrollbar {
  width: 6px;
}
.messages::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.15);
  border-radius: 10px;
}

/* Row */
.message-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}

/* Avatar */
.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
}

/* Bubble */
.message {
  position: relative;
  max-width: 65%;
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.4;
  box-shadow: var(--shadow);
  animation: fadeIn 0.2s ease;
}

.message small {
  display: block;
  font-size: 11px;
  margin-top: 5px;
  opacity: 0.6;
}

/* Sent */
.sent {
  margin-left: auto;
  background: var(--primary);
  color: white;
  border-bottom-right-radius: 6px;
}

.sent::after {
  content: "";
  position: absolute;
  right: -6px;
  bottom: 0;
  width: 12px;
  height: 12px;
  background: var(--primary);
  clip-path: polygon(0 0, 100% 100%, 0 100%);
}

/* Received */
.received {
  background: var(--received);
  border-bottom-left-radius: 6px;
}

.received::after {
  content: "";
  position: absolute;
  left: -6px;
  bottom: 0;
  width: 12px;
  height: 12px;
  background: var(--received);
  clip-path: polygon(100% 0, 100% 100%, 0 100%);
}

/* ================= INPUT ================= */

.input-area {
  height: 70px;
  padding: 0 15px;
  background: white;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.input-area input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 25px;
  border: 1px solid var(--border);
  outline: none;
}

.input-area button {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
}

/* ================= DRAWER (UNCHANGED LOGIC) ================= */

.drawer {
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: 350px;
  background: #111827;
  color: white;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  z-index: 100;
}

.drawer.open {
  transform: translateX(0);
}

.drawer-header {
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid #374151;
}

.drawer-profile {
  text-align: center;
  padding: 20px;
}

.drawer-profile img {
  width: 70px;
  border-radius: 50%;
}

.drawer-tabs {
  display: flex;
}

.drawer-tabs button {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  color: #9ca3af;
  cursor: pointer;
}

.drawer-tabs .active {
  color: white;
  border-bottom: 2px solid var(--primary);
}

.drawer-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* Overlay */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 90;
}

.overlay.show {
  display: block;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div class="app">

  <!-- CHAT -->
  <div class="chat">

    <header class="chat-header">
      <div class="user">
        <img src="https://i.pravatar.cc/100?img=12">
        <div>
          <h4>Imran Khan</h4>
          <span>Online</span>
        </div>
      </div>
      <button id="settingsBtn" class="icon-btn">⋮</button>
    </header>

    <div class="messages" id="messages">

      <div class="message-row">
        <img class="avatar" src="https://i.pravatar.cc/100?img=12">
        <div class="message received">
          Hey 👋
          <small>10:12 AM</small>
        </div>
      </div>

      <div class="message-row">
        <div class="message sent">
          Hello!
          <small>10:13 AM • Seen</small>
        </div>
      </div>

    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button id="sendBtn">Send</button>
    </div>

  </div>

  <!-- DRAWER -->
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <h3>Chat Info</h3>
      <button id="closeDrawer" class="icon-btn">✕</button>
    </div>
    <div class="drawer-profile">
      <img src="https://i.pravatar.cc/100?img=12">
      <h4>Imran Khan</h4>
      <p>@mdimrankhansiam</p>
    </div>
    <div class="drawer-tabs">
      <button class="tab active" data-tab="info">Info</button>
      <button class="tab" data-tab="media">Media</button>
      <button class="tab" data-tab="files">Files</button>
    </div>
    <div class="drawer-content">
      <div class="tab-content active" id="info">
        <p>🔒 End-to-end encrypted</p>
      </div>
      <div class="tab-content" id="media">No media yet</div>
      <div class="tab-content" id="files">No files yet</div>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

</div>

<script>

/* Drawer logic (RESTORED) */
const drawer = document.getElementById("drawer");
const overlay = document.getElementById("overlay");
const settingsBtn = document.getElementById("settingsBtn");
const closeDrawer = document.getElementById("closeDrawer");

settingsBtn.onclick = () => {
  drawer.classList.add("open");
  overlay.classList.add("show");
};

function closePanel() {
  drawer.classList.remove("open");
  overlay.classList.remove("show");
}

closeDrawer.onclick = closePanel;
overlay.onclick = closePanel;

/* Tabs */
document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
  };
});

/* Send Message */
const messages = document.getElementById("messages");
const input = document.getElementById("messageInput");

document.getElementById("sendBtn").onclick = sendMessage;
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

function sendMessage() {
  if (!input.value.trim()) return;

  const row = document.createElement("div");
  row.className = "message-row";

  const msg = document.createElement("div");
  msg.className = "message sent";
  msg.innerHTML = input.value + `<small>${getTime()}</small>`;

  row.appendChild(msg);
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;

  input.value = "";
}

function getTime() {
  const d = new Date();
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

messages.addEventListener("scroll", () => {
  if (messages.scrollTop === 0) {
    const previousHeight = messages.scrollHeight;

    for (let i = 0; i < 5; i++) {
      const msg = document.createElement("div");
      msg.className = "message received";
      msg.textContent = "Older message";
      messages.prepend(msg);
    }

    const newHeight = messages.scrollHeight;
    messages.scrollTop = newHeight - previousHeight;
  }
});

</script>

</body>
</html>
